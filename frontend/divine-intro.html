<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="src/assets/logo/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Introduction</title>
    
    <!-- Tailwind Engine and Font CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .serif-title { font-family: 'Playfair Display', serif; }
        
        /* Native CSS animations matching your framer-motion specifications */
        @keyframes introScaleUp {
            from { opacity: 0; transform: scale(0.6); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes symbolRotate {
            from { transform: rotate(-20deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }
        @keyframes textSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes simpleFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-intro { animation: introScaleUp 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-symbol { animation: symbolRotate 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-title { opacity: 0; animation: textSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards; }
        .animate-desc { opacity: 0; animation: simpleFade 1.5s ease 2s forwards; }
    </style>
</head>
<body class="fixed inset-0 z-[999] flex items-center justify-center overflow-hidden select-none">

    <!-- Background Cinematic Ambient Glow -->
    <div class="absolute w-[500px] h-[500px] bg-yellow-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- MAIN LOADING MASK -->
    <div id="loading-spinner" class="absolute inset-0 z-50 flex items-center justify-center bg-[#020617]">
        <div class="w-10 h-10 border-4 border-yellow-900/40 border-t-yellow-400 rounded-full animate-spin"></div>
    </div>

    <!-- CONTENT WRAPPER -->
    <div id="content-container" class="relative z-10 flex flex-col items-center text-center px-6 hidden animate-intro">

        <!-- Divine Symbol Frame -->
        <div class="animate-symbol">
            <img id="god-img" src="" alt="Divine Symbol" class="w-[180px] md:w-[240px] drop-shadow-[0_10px_20px_rgba(234,179,8,0.2)]">
        </div>

        <!-- Main Chant Header Title -->
        <h1 id="god-title" class="serif-title mt-8 text-4xl md:text-6xl font-bold text-yellow-400 tracking-wide animate-title">
            Shri Ganeshaaya Namaha
        </h1>

        <!-- Sacred Description Subtitle -->
        <p id="god-desc" class="mt-6 text-yellow-500 text-lg md:text-2xl max-w-3xl leading-relaxed font-light animate-desc">
            With the blessings of Lord Ganesha, we invite you to celebrate this sacred wedding journey.
        </p>

    </div>

    <!-- COMPONENT CORE HYDRATION ORCHESTRATOR -->
    <script>
        // 1. Establish Configuration Parameters
        const BACKEND_API = "https://cinematic-invitation-backend.onrender.com"; // Keep uniform with landing.html
        const DEFAULT_GANESHA_IMAGE = "https://raw.githubusercontent.com/satya24mai26-gif/sample-data/main/ganesha.png"; // Fallback asset path

        // Predefined fallback theme configs matching your config dictionary
        const fallbackThemes = {
            ganesha: {
                src: DEFAULT_GANESHA_IMAGE,
                title: "Shri Ganeshaaya Namaha",
                description: "With the blessings of Lord Ganesha, we invite you to celebrate this sacred wedding journey."
            }
        };

        // 2. Extract query string parameters from browser window context
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const side = urlParams.get('side') || 'bride';

        if (!slug) {
            alert("Routing parameter missing. Redirecting to home.");
            window.location.href = "./index.html";
        } else {
            fetchDivineDetails(slug);
        }

        // 3. Request data stream from remote instance
        async function fetchDivineDetails(targetSlug) {
            try {
                const response = await fetch(`${BACKEND_API}/api/invitations/${targetSlug}`);
                if (!response.ok) throw new Error("Database network interruption");

                const result = await response.json();
                const invitationData = result.data || result;

                // Safely resolve the background dataset properties
                const selectedGodKey = invitationData.godIntro?.god || "ganesha";
                const activeTheme = fallbackThemes[selectedGodKey] || fallbackThemes.ganesha;

                // DOM Node Injection 
                document.getElementById('god-img').src = invitationData.godIntro?.src || activeTheme.src;
                document.getElementById('god-title').innerText = invitationData.godIntro?.title || activeTheme.title;
                document.getElementById('god-desc').innerText = invitationData.godIntro?.discription || activeTheme.description;

                // Display structured content layout, eliminate shell loaders
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('content-container').classList.remove('hidden');

                // 4. Initiate countdown sequence to transfer route location downstream
                setTimeout(() => {
                    window.location.href = `./invitation.html?slug=${targetSlug}&side=${side}`;
                }, 4000);

            } catch (error) {
                console.error("Hydration Interrupted:", error);
                // Fallback graceful degradation execution 
                document.getElementById('god-img').src = fallbackThemes.ganesha.src;
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('content-container').classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = `./invitation.html?slug=${targetSlug}&side=${side}`;
                }, 4000);
            }
        }
    </script>
</body>
</html>
