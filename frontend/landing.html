<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="src/assets/logo/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Invite — Cinematic Welcome</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-title { font-family: 'Playfair Display', serif; }
        
        /* Smooth native keyframe replacements for framer-motion loops */
        @keyframes floatingGlow {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(40px, -30px) scale(1.1); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-glow { animation: floatingGlow 10s ease-in-out infinite; }
        .animate-card { animation: cardFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="relative min-h-screen overflow-hidden flex items-center justify-center px-6 bg-[#fff8f0]">

    <div class="absolute top-[-120px] left-[-120px] w-[420px] h-[420px] rounded-full blur-3xl opacity-40 animate-glow"
         style="background: radial-gradient(circle, #fbbf24 0%, transparent 70%);"></div>
    <div class="absolute bottom-[-150px] right-[-100px] w-[420px] h-[420px] rounded-full blur-3xl opacity-40 animate-glow"
         style="background: radial-gradient(circle, #f472b6 0%, transparent 70%); animation-delay: -3s;"></div>

    <div class="absolute inset-0 bg-[linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent)] opacity-40 mix-blend-overlay"></div>

    <div id="loading-state" class="absolute inset-0 z-50 flex items-center justify-center bg-[#fff8f0] transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-orange-200 border-t-orange-600 rounded-full animate-spin"></div>
    </div>

    <div id="main-card" class="relative z-10 w-full max-w-4xl rounded-[50px] backdrop-blur-xl bg-white/40 border border-white/50 shadow-[0_20px_80px_rgba(0,0,0,0.08)] p-10 md:p-16 text-center opacity-0 animate-card">
        
        <div class="relative mx-auto w-[240px] h-[240px] transition-transform duration-700 hover:scale-105">
            <div class="absolute inset-0 rounded-full blur-3xl opacity-40 bg-pink-300"></div>
            <img id="couple-img" src="" alt="Loading Couple" class="relative z-10 w-full h-full object-cover rounded-full border-[8px] border-white shadow-2xl">
        </div>

        <p class="mt-10 tracking-[8px] uppercase text-xs md:text-sm text-orange-700 font-semibold">
            Together With Families
        </p>

        <div class="relative flex items-center justify-center mt-4">
            <div class="mt-2 flex justify-center">
                <h1 id="invitation-title" class="serif-title text-4xl md:text-6xl text-pink-600 font-bold select-none tracking-wide">
                    Loading Title...
                </h1>
            </div>
        </div>

        <div class="mt-10 space-y-3">
            <p id="wedding-date" class="text-xl md:text-2xl text-zinc-700 font-medium"></p>
            <p id="wedding-venue" class="text-base md:text-lg text-zinc-500 max-w-xl mx-auto leading-relaxed"></p>
        </div>

        <div class="mt-14 flex flex-col sm:flex-row items-center justify-center gap-6">
            <button onclick="handleSideSelect('bride')" class="w-full sm:w-auto px-10 h-14 rounded-full bg-pink-500 hover:bg-pink-600 text-white text-base font-semibold shadow-xl shadow-pink-500/10 transition duration-300 transform hover:-translate-y-0.5">
                Bride Side
            </button>
            <button onclick="handleSideSelect('groom')" class="w-full sm:w-auto px-10 h-14 rounded-full bg-orange-500 hover:bg-orange-600 text-white text-base font-semibold shadow-xl shadow-orange-500/10 transition duration-300 transform hover:-translate-y-0.5">
                Groom Side
            </button>
        </div>

        <p class="mt-14 text-zinc-400 italic text-sm md:text-base border-t border-zinc-200/40 pt-8">
            “Two souls, one sacred journey, blessed with love and tradition.”
        </p>
    </div>

    <script>
        // 1. Target URL Configurations
        const BACKEND_API = "https://cinematic-invitation-backend.onrender.com"; // Replace with your production server link
        const DEFAULT_FALLBACK_IMAGE = "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=500"; 

        // 2. Parse URL parameters safely natively
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (!slug) {
            document.getElementById('invitation-title').innerText = "No Invitation Specified";
            document.getElementById('loading-state').style.display = 'none';
        } else {
            loadInvitationData(slug);
        }

        // 3. Perform network stream ingestion directly from database
        async function loadInvitationData(targetSlug) {
            try {
                const response = await fetch(`${BACKEND_API}/api/invitations/${targetSlug}`);
                if (!response.ok) throw new Error("Invitation details unreachable");

                const result = await response.json();
                const data = result.data || result; // Fallback adaptation depending on response encapsulation

                // Map data targets to the DOM Nodes safely
                document.getElementById('invitation-title').innerText = data.landingPage?.title || "Satya ❤ Vasavi";
                document.getElementById('couple-img').src = data.landingPage?.coupleImage || DEFAULT_FALLBACK_IMAGE;
                document.getElementById('wedding-date').innerText = data.wedding?.date || "Date to be Announced";
                document.getElementById('wedding-venue').innerText = data.wedding?.venue || "Venue Details Pending";

                // Remove Loader Interface smoothly
                const loader = document.getElementById('loading-state');
                loader.classList.add('opacity-0');
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (error) {
                console.error("Hydration Engine Error:", error);
                document.getElementById('invitation-title').innerText = "Invitation Not Found";
                document.getElementById('loading-state').style.display = 'none';
            }
        }

        // 4. Client Interactivity execution logic
        function handleSideSelect(selectedSide) {
            // Native redirection sequence carrying state parameters downstream
            window.location.href = `./divine-intro.html?slug=${slug}&side=${selectedSide}`;
        }
    </script>
</body>
</html>
